<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberFeed — Security Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mantine/core@7.15.0/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mantine/notifications@7.15.0/styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    [data-mantine-color-scheme="dark"] body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,124,0.012) 2px, rgba(0,212,124,0.012) 4px);
      pointer-events: none; z-index: 9999;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,212,124,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,124,0.6); }
    .feed-card {
      border-radius: 6px;
      border: 1px solid rgba(0,212,124,0.1);
      background: rgba(25,27,30,0.85);
      transition: border-color 0.2s, box-shadow 0.2s;
      padding: 14px 14px 14px 20px;
      position: relative;
      overflow: hidden;
    }
    .feed-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: rgba(0,212,124,0.2);
    }
    .feed-card.recent::before {
      background: linear-gradient(180deg, #00d47c, #00a85f);
    }
    .feed-card:hover {
      border-color: rgba(0,212,124,0.35);
      box-shadow: 0 0 20px rgba(0,212,124,0.06);
    }
    [data-scheme="light"] .feed-card {
      background: rgba(255,255,255,0.92);
      border-color: rgba(0,120,70,0.12);
    }
    [data-scheme="light"] .feed-card::before { background: rgba(0,120,70,0.18); }
    [data-scheme="light"] .feed-card:hover { border-color: rgba(0,120,70,0.3); box-shadow: 0 2px 16px rgba(0,120,70,0.08); }
    mark { background: rgba(0,212,124,0.28); color: inherit; border-radius: 2px; padding: 0 1px; }
    .source-item { cursor: pointer; border-radius: 4px; padding: 6px 10px; transition: background 0.15s; }
    .source-item:hover { background: rgba(0,212,124,0.07); }
    .source-item.active { background: rgba(0,212,124,0.13); }
    [data-scheme="light"] .source-item:hover { background: rgba(0,120,70,0.07); }
    [data-scheme="light"] .source-item.active { background: rgba(0,120,70,0.1); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mantine/core@7.15.0/dist/mantine-core.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mantine/hooks@7.15.0/dist/mantine-hooks.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mantine/notifications@7.15.0/dist/mantine-notifications.umd.min.js"></script>

<script>
(function() {
  'use strict';

  const { useState, useEffect, useCallback, useRef, useMemo } = React;
  const {
    MantineProvider, createTheme, ColorSchemeScript,
    Box, Stack, Group, Text, Badge, ActionIcon, Anchor,
    TextInput, SegmentedControl, ScrollArea, Tooltip,
    ThemeIcon, Center, Loader, Alert, Button,
    useMantineColorScheme, useComputedColorScheme,
  } = window.Mantine;
  const { Notifications, notifications } = window.MantineNotifications || {};

  // ─── Theme ──────────────────────────────────────────────────────────────────
  const theme = createTheme({
    fontFamily: '"IBM Plex Sans", sans-serif',
    fontFamilyMonospace: '"Space Mono", monospace',
    headings: { fontFamily: '"Space Mono", monospace' },
    colors: {
      brand: ['#e8fff4','#c6ffe4','#88ffca','#3dffac','#00f090','#00d47c','#00a85f','#008049','#006038','#00402a'],
      dark: ['#C1C2C5','#A6A7AB','#909296','#5C5F66','#373A40','#2C2E33','#25262B','#1A1B1E','#141517','#101113'],
    },
    primaryColor: 'brand',
    defaultRadius: 'sm',
  });

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function isRecent(iso) {
    if (!iso) return false;
    return Date.now() - new Date(iso).getTime() < 86_400_000;
  }

  function highlightText(text, query) {
    if (!query || !query.trim()) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const parts = text.split(new RegExp(`(${escaped})`, 'gi'));
    return parts.map((p, i) =>
      p.toLowerCase() === query.toLowerCase()
        ? React.createElement('mark', { key: i }, p)
        : p
    );
  }

  // ─── useFeeds hook ────────────────────────────────────────────────────────────
  function useFeeds() {
    const [data, setData] = useState(null);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);
    const [lastRefreshed, setLastRefreshed] = useState(null);
    const abortRef = useRef(null);

    const fetchData = useCallback(async () => {
      if (abortRef.current) abortRef.current.abort();
      const controller = new AbortController();
      abortRef.current = controller;
      setLoading(true);
      setError(null);
      try {
        const resp = await fetch('/api/feeds', { signal: controller.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        setData(json);
        setLastRefreshed(new Date());
      } catch (err) {
        if (err.name === 'AbortError') return;
        setError(err.message || 'Unknown error');
      } finally {
        setLoading(false);
      }
    }, []);

    useEffect(() => {
      fetchData();
      const id = setInterval(fetchData, 60_000);
      return () => { clearInterval(id); abortRef.current?.abort(); };
    }, [fetchData]);

    return { data, loading, error, refresh: fetchData, lastRefreshed };
  }

  // ─── FeedCard ────────────────────────────────────────────────────────────────
  function FeedCard({ item, searchQuery }) {
    const isDark = useComputedColorScheme('dark') === 'dark';
    const recent = isRecent(item.published);

    return React.createElement(Box, {
      className: `feed-card fade-in${recent ? ' recent' : ''}`,
      'data-scheme': isDark ? 'dark' : 'light',
      mb: 'xs',
    },
      // Source + date row
      React.createElement(Group, { justify: 'space-between', align: 'center', wrap: 'nowrap', mb: 6 },
        React.createElement(Group, { gap: 6, align: 'center' },
          React.createElement(Badge, {
            size: 'xs', variant: 'filled', color: 'brand', radius: 'sm',
            ff: 'monospace',
            style: { letterSpacing: '0.04em', textTransform: 'uppercase', fontSize: 9 }
          }, item.source),
          recent && React.createElement(Badge, {
            size: 'xs', variant: 'light', color: 'green', radius: 'sm',
            ff: 'monospace', style: { fontSize: 9, letterSpacing: '0.06em' }
          }, 'NEW')
        ),
        item.published && React.createElement(Text, {
          size: 'xs', c: 'dimmed', ff: 'monospace',
          style: { fontSize: 11, flexShrink: 0 }
        }, fmtDate(item.published))
      ),
      // Title
      React.createElement(Anchor, {
        href: item.link,
        target: '_blank',
        rel: 'noopener noreferrer',
        underline: 'never',
        style: {
          color: isDark ? '#e4e5e7' : '#1a1b1e',
          fontWeight: 600,
          lineHeight: 1.35,
          fontSize: '0.88rem',
          display: 'block',
          marginBottom: 6,
        }
      }, highlightText(item.title, searchQuery)),
      // Description
      item.description && React.createElement(Text, {
        size: 'sm', c: 'dimmed',
        style: { lineHeight: 1.55, fontSize: '0.81rem', marginBottom: 8 }
      }, highlightText(item.description, searchQuery)),
      // Footer
      React.createElement(Group, { justify: 'space-between', align: 'center' },
        item.author
          ? React.createElement(Text, { size: 'xs', c: 'dimmed', style: { fontSize: 11 } }, `✎ ${item.author}`)
          : React.createElement('span', {}),
        item.categories && item.categories.length > 0
          ? React.createElement(Group, { gap: 4 },
              ...item.categories.slice(0, 3).map(cat =>
                React.createElement(Badge, {
                  key: cat, size: 'xs', variant: 'outline', color: 'gray',
                  radius: 'sm', style: { fontSize: 10 }
                }, cat)
              )
            )
          : null
      )
    );
  }

  // ─── SourcesSidebar ───────────────────────────────────────────────────────────
  function SourcesSidebar({ sources, selectedSource, onSelectSource }) {
    const isDark = useComputedColorScheme('dark') === 'dark';
    const total = sources.reduce((a, s) => a + s.itemCount, 0);

    return React.createElement(Box, {
      style: {
        width: 248,
        flexShrink: 0,
        borderRight: isDark ? '1px solid rgba(0,212,124,0.12)' : '1px solid rgba(0,120,70,0.1)',
        height: '100%',
        display: 'flex', flexDirection: 'column',
      }
    },
      React.createElement(Box, {
        px: 'md', py: 'sm',
        style: { borderBottom: isDark ? '1px solid rgba(0,212,124,0.1)' : '1px solid rgba(0,120,70,0.08)' }
      },
        React.createElement(Text, {
          size: 'xs', fw: 700, ff: 'monospace', c: 'dimmed',
          style: { letterSpacing: '0.1em' }
        }, 'SOURCES')
      ),
      React.createElement(ScrollArea, { style: { flex: 1 }, scrollbarSize: 4, p: 'xs' },
        React.createElement(Stack, { gap: 2, p: 'xs' },
          // All sources
          React.createElement(Box, {
            className: `source-item${selectedSource === null ? ' active' : ''}`,
            'data-scheme': isDark ? 'dark' : 'light',
            onClick: () => onSelectSource(null),
          },
            React.createElement(Group, { justify: 'space-between', align: 'center' },
              React.createElement(Text, {
                size: 'sm',
                fw: selectedSource === null ? 600 : 400,
                c: selectedSource === null ? 'brand' : undefined,
              }, 'All Sources'),
              React.createElement(Badge, {
                size: 'xs', variant: 'filled', color: 'brand', radius: 'sm'
              }, total)
            )
          ),
          // Individual sources
          ...sources.map(src =>
            React.createElement(Box, {
              key: src.name,
              className: `source-item${selectedSource === src.name ? ' active' : ''}`,
              'data-scheme': isDark ? 'dark' : 'light',
              onClick: () => onSelectSource(selectedSource === src.name ? null : src.name),
              style: { opacity: src.ok ? 1 : 0.55 },
            },
              React.createElement(Group, { justify: 'space-between', align: 'flex-start', wrap: 'nowrap' },
                React.createElement(Group, { gap: 6, align: 'flex-start', style: { flex: 1, minWidth: 0 } },
                  React.createElement(Text, {
                    style: { fontSize: 11, marginTop: 2, flexShrink: 0, color: src.ok ? '#00d47c' : '#fa5252' }
                  }, src.ok ? '●' : '○'),
                  React.createElement(Box, { style: { minWidth: 0 } },
                    React.createElement(Text, {
                      size: 'xs',
                      fw: selectedSource === src.name ? 600 : 400,
                      c: selectedSource === src.name ? 'brand' : undefined,
                      style: { lineHeight: 1.3, wordBreak: 'break-word' }
                    }, src.name),
                    src.error && React.createElement(Text, {
                      size: 'xs', c: 'red', style: { fontSize: 10 },
                      title: src.error
                    }, 'fetch error')
                  )
                ),
                src.ok && React.createElement(Badge, {
                  size: 'xs', variant: 'outline', color: 'brand', radius: 'sm', style: { flexShrink: 0 }
                }, src.itemCount)
              )
            )
          )
        )
      )
    );
  }

  // ─── Header ───────────────────────────────────────────────────────────────────
  function Header({ onRefresh, loading, lastRefreshed, totalItems, activeSources }) {
    const { setColorScheme } = useMantineColorScheme();
    const isDark = useComputedColorScheme('dark') === 'dark';

    const fmtTime = d => d
      ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
      : 'never';

    return React.createElement(Box, {
      component: 'header',
      style: {
        borderBottom: isDark ? '1px solid rgba(0,212,124,0.2)' : '1px solid rgba(0,120,70,0.15)',
        backdropFilter: 'blur(12px)',
        position: 'sticky', top: 0, zIndex: 100,
        background: isDark ? 'rgba(16,17,19,0.93)' : 'rgba(248,252,250,0.93)',
      }
    },
      React.createElement(Group, {
        justify: 'space-between', align: 'center',
        px: 'xl', py: 'sm',
        style: { maxWidth: 1400, margin: '0 auto', width: '100%' }
      },
        // Logo
        React.createElement(Group, { gap: 'sm', align: 'center' },
          React.createElement(Box, {
            style: {
              background: 'linear-gradient(135deg, #00d47c, #007840)',
              borderRadius: 6, padding: '6px 8px',
              fontFamily: '"Space Mono", monospace',
              color: 'white', fontWeight: 700, fontSize: 13,
            }
          }, '⬡'),
          React.createElement(Box, {},
            React.createElement(Text, {
              ff: 'monospace', fw: 700, size: 'lg',
              style: {
                letterSpacing: '-0.02em',
                color: isDark ? '#00d47c' : '#007840',
                lineHeight: 1.1,
              }
            }, 'CYBERFEED'),
            React.createElement(Text, {
              size: 'xs', c: 'dimmed', ff: 'monospace',
              style: { letterSpacing: '0.08em' }
            }, 'SECURITY INTELLIGENCE')
          )
        ),
        // Stats
        React.createElement(Group, { gap: 'md' },
          React.createElement(Badge, {
            variant: 'light', color: 'brand', size: 'sm', ff: 'monospace',
            style: { letterSpacing: '0.05em' }
          }, `${totalItems} ITEMS`),
          React.createElement(Badge, {
            variant: 'outline', color: activeSources > 0 ? 'green' : 'red',
            size: 'sm', ff: 'monospace', style: { letterSpacing: '0.05em' }
          }, `${activeSources} SOURCES ONLINE`),
          lastRefreshed && React.createElement(Text, {
            size: 'xs', c: 'dimmed', ff: 'monospace'
          }, `REFRESHED ${fmtTime(lastRefreshed)}`)
        ),
        // Actions
        React.createElement(Group, { gap: 'xs' },
          React.createElement(ActionIcon, {
            variant: 'subtle', color: 'brand', size: 'lg',
            onClick: onRefresh, 'aria-label': 'Refresh',
          },
            React.createElement('span', {
              className: loading ? 'spin' : '',
              style: { display: 'inline-block', fontSize: 16 }
            }, '↻')
          ),
          React.createElement(ActionIcon, {
            variant: 'subtle',
            color: isDark ? 'yellow' : 'dark',
            size: 'lg',
            onClick: () => setColorScheme(isDark ? 'light' : 'dark'),
            'aria-label': 'Toggle theme',
          }, isDark ? '☀' : '☾')
        )
      )
    );
  }

  // ─── Toolbar ─────────────────────────────────────────────────────────────────
  function Toolbar({ search, onSearchChange, sortBy, onSortChange, visibleCount, totalCount }) {
    const isDark = useComputedColorScheme('dark') === 'dark';
    return React.createElement(Box, {
      style: {
        borderBottom: isDark ? '1px solid rgba(0,212,124,0.1)' : '1px solid rgba(0,120,70,0.08)',
        background: isDark ? 'rgba(20,21,23,0.7)' : 'rgba(245,250,247,0.8)',
        backdropFilter: 'blur(8px)', padding: '10px 24px', flexShrink: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16,
      }
    },
      React.createElement(TextInput, {
        placeholder: 'Search titles, descriptions, sources…',
        value: search,
        onChange: e => onSearchChange(e.currentTarget.value),
        size: 'sm',
        style: { width: 320 },
        styles: {
          input: {
            fontFamily: '"IBM Plex Sans", sans-serif',
            fontSize: '0.85rem',
            background: isDark ? 'rgba(30,32,36,0.85)' : undefined,
            border: isDark ? '1px solid rgba(0,212,124,0.15)' : undefined,
          }
        }
      }),
      React.createElement(Group, { gap: 'md', align: 'center' },
        React.createElement(Text, { size: 'xs', c: 'dimmed', ff: 'monospace' },
          `${visibleCount} / ${totalCount} items`
        ),
        React.createElement(SegmentedControl, {
          size: 'xs',
          value: sortBy,
          onChange: v => onSortChange(v),
          data: [
            { label: 'DATE', value: 'date' },
            { label: 'SOURCE', value: 'source' },
          ],
          styles: {
            root: { fontFamily: '"Space Mono", monospace' },
            label: { fontSize: 11, letterSpacing: '0.06em' },
          }
        })
      )
    );
  }

  // ─── App ─────────────────────────────────────────────────────────────────────
  function App() {
    const { data, loading, error, refresh, lastRefreshed } = useFeeds();
    const [selectedSource, setSelectedSource] = useState(null);
    const [search, setSearch] = useState('');
    const [sortBy, setSortBy] = useState('date');
    const isDark = useComputedColorScheme('dark') === 'dark';

    const filtered = useMemo(() => {
      if (!data?.items) return [];
      let items = data.items;
      if (selectedSource) items = items.filter(i => i.source === selectedSource);
      const q = search.trim().toLowerCase();
      if (q) items = items.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.description.toLowerCase().includes(q) ||
        i.source.toLowerCase().includes(q) ||
        (i.author && i.author.toLowerCase().includes(q)) ||
        (i.categories && i.categories.some(c => c.toLowerCase().includes(q)))
      );
      if (sortBy === 'source') {
        items = [...items].sort((a, b) => {
          const s = a.source.localeCompare(b.source);
          return s !== 0 ? s : new Date(b.published).getTime() - new Date(a.published).getTime();
        });
      }
      return items;
    }, [data, selectedSource, search, sortBy]);

    const activeSources = data?.sources.filter(s => s.ok).length ?? 0;

    return React.createElement(Box, {
      style: {
        minHeight: '100vh',
        background: isDark
          ? 'linear-gradient(160deg, #101113 0%, #14171a 50%, #0d1210 100%)'
          : 'linear-gradient(160deg, #f5faf7 0%, #eef7f2 100%)',
        display: 'flex', flexDirection: 'column',
      }
    },
      React.createElement(Header, {
        onRefresh: refresh, loading,
        lastRefreshed, totalItems: data?.items.length ?? 0, activeSources,
      }),
      React.createElement(Box, { style: { display: 'flex', flex: 1, overflow: 'hidden', minHeight: 0 } },
        // Sidebar
        data && React.createElement(SourcesSidebar, {
          sources: data.sources,
          selectedSource, onSelectSource: setSelectedSource,
        }),
        // Main
        React.createElement(Box, { style: { flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' } },
          data && React.createElement(Toolbar, {
            search, onSearchChange: setSearch,
            sortBy, onSortChange: setSortBy,
            visibleCount: filtered.length, totalCount: data.items.length,
          }),
          React.createElement(Box, { style: { flex: 1, overflowY: 'auto', padding: '16px 24px' } },
            // Error
            error && !data && React.createElement(Alert, {
              color: 'red',
              title: 'Failed to load feeds',
              mt: 'xl', maw: 600, mx: 'auto',
            }, `${error} — The server may still be loading feeds on first start. Please wait and refresh.`),
            // First load spinner
            loading && !data && React.createElement(Center, { h: 300 },
              React.createElement(Stack, { align: 'center', gap: 'md' },
                React.createElement(Loader, { size: 'lg', color: 'brand', type: 'dots' }),
                React.createElement(Text, { c: 'dimmed', ff: 'monospace', size: 'sm', style: { letterSpacing: '0.1em' } },
                  'FETCHING FEEDS…'),
                React.createElement(Text, { c: 'dimmed', size: 'xs' },
                  'This may take up to 15 seconds on first start')
              )
            ),
            // Items
            data && (
              filtered.length === 0
                ? React.createElement(Center, { h: 200 },
                    React.createElement(Text, { c: 'dimmed', ff: 'monospace', size: 'sm' },
                      search ? 'NO RESULTS FOUND' : 'NO ITEMS'))
                : React.createElement(Stack, { gap: 'sm', maw: 900 },
                    ...filtered.map((item, idx) =>
                      React.createElement(FeedCard, {
                        key: `${item.source}-${item.link}-${idx}`,
                        item, searchQuery: search,
                      })
                    )
                  )
            ),
            // Footer timestamp
            data && React.createElement(Group, { justify: 'center', mt: 'xl', mb: 'md' },
              React.createElement(Text, {
                size: 'xs', c: 'dimmed', ff: 'monospace',
                style: { opacity: 0.45, letterSpacing: '0.05em' }
              }, `SERVER LAST UPDATED: ${new Date(data.updatedAt).toLocaleString()} · NEXT REFRESH IN ~15 MIN`)
            )
          )
        )
      )
    );
  }

  // ─── Bootstrap ───────────────────────────────────────────────────────────────
  function Root() {
    return React.createElement(MantineProvider, { theme, defaultColorScheme: 'dark' },
      React.createElement(App)
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(React.StrictMode, null, React.createElement(Root))
  );
})();
</script>
</body>
</html>
